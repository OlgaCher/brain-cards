<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{home.title}">Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="hero">
        <h1 class="greeting"
            th:text="#{home.greeting(${parent.displayName != null and !parent.displayName.isEmpty() ? parent.displayName : parent.email})}">
            Welcome</h1>
        <div class="child-info" th:if="${child != null}">
            <span class="chip">
                <strong th:text="#{home.child.name}">Name</strong>:
                <span th:text="${child.name}">Name</span>
            </span>
            <span class="chip" th:if="${child.birthDate != null}">
                <strong th:text="#{home.child.birthDate}">Birth date</strong>:
                <span th:text="${child.birthDate}">Birth date</span>
            </span>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <div>
                <h2 th:text="#{home.suggestions.title}">Today's five</h2>
                <p class="subtitle" th:text="#{home.suggestions.subtitle}">One game from each development zone</p>
            </div>
            <span class="pill" th:text="#{home.suggestions.time}">≈ 15–20 min</span>
        </div>

        <p class="notice" th:if="${child == null}" th:text="#{home.suggestions.noChild}">Add your child first.</p>
        <p class="notice" th:if="${noGamesForAge}" th:text="#{home.suggestions.noGamesForAge}">No games for this age.</p>
        <p class="notice" th:if="${child != null and #lists.isEmpty(todaysGames) and !noGamesForAge}"
           th:text="#{home.suggestions.empty}">Nothing left for today.</p>

        <div class="game-cards" th:if="${!#lists.isEmpty(todaysGames)}">
            <div class="game-card" th:each="game : ${todaysGames}"
                 th:classappend="${'accent-' + (game.zoneId % 5)}">
                <input type="checkbox" class="flip-toggle" th:id="${'flip-' + game.id}"/>
                <div class="card-inner">
                    <div class="card-face card-front">
                        <label class="flip-label" th:for="${'flip-' + game.id}">
                            <span class="zone-badge" th:text="${game.zoneName}">Zone</span>
                            <p class="game-title" th:text="${game.title}">Game title</p>
                            <span class="tap-hint" th:text="#{home.suggestions.tapForInstructions}">Tap for instructions</span>
                        </label>
                        <div class="card-actions">
                            <form th:action="@{'/home/games/' + ${game.id} + '/swap'}" method="post">
                                <button type="submit" class="swap-button" th:text="#{home.suggestions.swap}">Swap</button>
                            </form>
                            <form th:action="@{'/home/games/' + ${game.id} + '/complete'}" method="post">
                                <button type="submit" class="done-button" th:text="#{home.suggestions.done}">Done</button>
                            </form>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <p class="game-instructions" th:text="${game.instructions}">Instructions</p>
                        <div class="card-back-links">
                            <label class="back-hint" th:for="${'flip-' + game.id}" th:text="#{home.suggestions.back}">Back</label>
                            <a class="coach-link" th:href="@{'/home/games/' + ${game.id} + '/coach'}"
                               th:text="#{coach.ask}">Ask the coach</a>
                        </div>
                        <div class="card-actions">
                            <form th:action="@{'/home/games/' + ${game.id} + '/swap'}" method="post">
                                <button type="submit" class="swap-button" th:text="#{home.suggestions.swap}">Swap</button>
                            </form>
                            <form th:action="@{'/home/games/' + ${game.id} + '/complete'}" method="post">
                                <button type="submit" class="done-button" th:text="#{home.suggestions.done}">Done</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <h2>
                <span th:text="#{home.zones.title}">All development zones</span>
                <span class="count-badge" th:text="${#lists.size(zones)}">10</span>
            </h2>
        </div>
        <div class="zone-cards">
            <a class="zone-card" th:each="zone : ${zones}"
               th:href="@{'/home/zones/' + ${zone.id}}"
               th:classappend="${'accent-' + (zone.id % 5)}">
                <p class="zone-name" th:text="${zone.name}">Zone name</p>
                <p class="zone-count" th:text="#{home.zones.count(${zone.gameCount})}">N games</p>
            </a>
        </div>
    </section>
</main>
</body>
</html>
