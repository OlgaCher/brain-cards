<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{login.title}">Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-wrap">
    <div class="auth-card accent-3">
        <h1 th:text="#{login.title}">Log in</h1>

        <p class="notice error" th:if="${param.error}" th:text="#{login.error}">Invalid credentials</p>
        <p class="notice" th:if="${param.logout}" th:text="#{login.logout.success}">Logged out</p>
        <p class="notice" th:if="${param.registered}" th:text="#{login.registered.success}">Registered</p>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label for="username" th:text="#{login.email}">Email</label>
                <input type="email" id="username" name="username" required="required"/>
            </div>
            <div class="field">
                <label for="password" th:text="#{login.password}">Password</label>
                <input type="password" id="password" name="password" required="required"/>
            </div>
            <button type="submit" th:text="#{login.submit}">Log in</button>
        </form>

        <p class="auth-alt">
            <span th:text="#{login.register.prompt}">No account?</span>
            <a th:href="@{/register}" th:text="#{login.register.link}">Register</a>
        </p>
    </div>
</main>
</body>
</html>
