spring.application.name=braincards
server.servlet.context-path=/braincards/v1

spring.datasource.url=jdbc:postgresql://localhost:4000/braincards_dev
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

braincards.suggestion.cooldown-days=7

braincards.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
braincards.ai.gemini.model=gemini-3.1-flash-lite
braincards.ai.gemini.api-key=${GEMINI_API_KEY:}
